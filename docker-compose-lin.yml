services: 
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=Europe/London
    volumes:
      - c:\media-stack\data:/data
      - C:\media-stack\conf\radarr:/config
    ports:
      - 7878:7878
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - TZ=Europe/London
    volumes:
      - C:\media-stack\conf\jackett:/config
      - c:\media-stack\data\downloads\torrents:/downloads
    ports:
      - 9117:9117
  flaresolver:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    ports:
      - 8191:8191