services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=0
      - PGID=0
      - VERSION=docker
    volumes:
      - /media-stack/conf/plex:/config
      - /mnt/tv:/tv
      - /mnt/movies:/movies
    ports:
      - 32400:32400
      - 1900:1900/udp
      - 3005:3005
      - 5353:5353/udp
      - 8324:8324
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
      - 32469:32469
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/London
      - WEBUI_PORT=8080
    volumes:
      - /media-stack/conf/qbittorent:/config
      - /media-stack/data/downloads/torrents:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=Europe/London
      - PUID=0
      - PGID=0
    volumes:
      - /media-stack/data:/data
      - /mnt/movies:/data/Movies
      - /media-stack/conf/radarr:/config
    ports:
      - 7878:7878
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - TZ=Europe/London
      - PUID=0
      - PGID=0
    volumes:
      - /media-stack/data:/data
      - /mnt/tv:/data/tv
      - /media-stack/conf/sonarr:/config
    ports:
      - 8989:8989  
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - TZ=Europe/London
    volumes:
      - /media-stack/conf/jackett:/config
      - /media-stack/data/downloads/torrents:/downloads
    ports:
      - 9117:9117
  flaresolver:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    ports:
      - 8191:8191