services:
  flaresolver:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flaresolver.rule=Host(`flaresolver.cbxon.co.uk`)"
      - "traefik.http.routers.flaresolver.entrypoints=web"  
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - TZ=Europe/London
    volumes:
      - /media-stack/conf/jackett:/config
      - /media-stack/data/downloads/torrents:/downloads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jackett.rule=Host(`jackett.cbxon.co.uk`)"
      - "traefik.http.routers.jackett.entrypoints=web"
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=0
      - PGID=0
      - VERSION=docker
    volumes:
      - /media-stack/conf/plex:/config
      - /mnt/tv:/tv
      - /mnt/movies:/movies
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/London
      - WEBUI_PORT=8080
    volumes:
      - /media-stack/conf/qbittorent:/config
      - /media-stack/data/downloads/torrents:/downloads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.cbxon.co.uk`)"
      - "traefik.http.routers.qbittorrent.entrypoints=web"
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=Europe/London
      - PUID=0
      - PGID=0
    volumes:
      - /media-stack/data:/data
      - /mnt/movies:/data/Movies
      - /media-stack/conf/radarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.cbxon.co.uk`)"
      - "traefik.http.routers.radarr.entrypoints=web"
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - TZ=Europe/London
      - PUID=0
      - PGID=0
    volumes:
      - /media-stack/data:/data
      - /mnt/tv:/data/tv
      - /media-stack/conf/sonarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.cbxon.co.uk`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
