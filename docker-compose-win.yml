services:
  uTorrent:
    container_name: uTorrent
    build: ./uTorrent/
    image: cbxon/utorrent-server:latest
    ports:
      - "8080:8080"
      - "6881:6881"
    volumes:
      - c:\media-stack\conf\uTorrent:/config
      - c:\media-stack\data\downloads\torrents:/downloads 
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=Europe/London
    volumes:
      - c:\media-stack\data:/data
      - C:\media-stack\conf\radarr:/config
    ports:
      - 7878:7878
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - TZ=Europe/London
    volumes:
      - C:\media-stack\conf\jackett:/config
      - c:\media-stack\data\downloads\torrents:/downloads
    ports:
      - 9117:9117
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - TZ=Europe/London
    volumes:
      - c:\media-stack\data:/data
      - C:\media-stack\conf\sonarr:/config
    ports:
      - 8989:8989
  flaresolver:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    ports:
      - 8191:8191